            <div class="flex flex-col items-center py-8 gap-6 font-label text-base uppercase tracking-widest">

                <a class="mobile-nav-link text-primary hover:text-on-surface transition-colors"

    <main class="w-full blueprint-grid mt-24">
        <!-- Blueprint Corner Markers -->
        <div class="corner-mark corner-tl"></div>
        <div class="corner-mark corner-tr"></div>
        <div class="corner-mark corner-bl"></div>
        <div class="corner-mark corner-br"></div>
        <div
            class="min-h-screen flex flex-col justify-center px-8 max-w-7xl mx-auto pt-12 pb-20 md:pt-16 relative z-10">
            <div class="max-w-2xl mx-auto w-full">
                <span class="font-label text-primary uppercase tracking-[0.4em] mb-4 block text-xs text-center">Get in
                    touch</span>
                <h1
                    class="font-headline text-5xl md:text-7xl font-bold tracking-tighter mb-12 text-center text-on-surface">
                    CONTACT <span class="italic text-primary-dim">ME</span></h1>

                <form action="https://formspree.io/f/xqeyvegr" method="POST"
                    class="bg-surface-container-high p-8 md:p-12 rounded-xl border border-outline/10 shadow-2xl space-y-8 relative overflow-hidden group">
                    <!-- Decorative element -->
                    <div
                        class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-primary/30 to-transparent">
                    </div>
                    <div class="absolute inset-0 pointer-events-none opacity-[0.03]"
                        style="background-image: radial-gradient(rgb(var(--color-primary)) 0.5px, transparent 0.5px); background-size: 20px 20px;">
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 relative z-10">
                        <div class="space-y-2">
                            <label class="font-label text-xs uppercase tracking-widest text-on-surface-variant block"
                                for="name">Name</label>
                            <input
                                class="w-full bg-surface-container-low border border-outline/30 rounded-DEFAULT px-4 py-3 text-on-surface font-body focus:outline-none focus:ring-0 focus:border-outline/30"
                                id="name" name="name" placeholder="John Doe" required type="text" />
                        </div>
                        <div class="space-y-2">
                            <label class="font-label text-xs uppercase tracking-widest text-on-surface-variant block"
                                for="email">Email address</label>
                            <input
                                class="w-full bg-surface-container-low border border-outline/30 rounded-DEFAULT px-4 py-3 text-on-surface font-body focus:outline-none focus:ring-0 focus:border-outline/30"
                                id="email" name="email" placeholder="johndoe@example.com" required type="email" />
                        </div>
                    </div>

                    <div class="space-y-2 relative z-10">
                        <label class="font-label text-xs uppercase tracking-widest text-on-surface-variant block"
                            for="subject">Subject</label>
                        <input
                            class="w-full bg-surface-container-low border border-outline/30 rounded-DEFAULT px-4 py-3 text-on-surface font-body focus:outline-none focus:ring-0 focus:border-outline/30"
                            id="subject" name="subject" placeholder="Project Inquiry" type="text" />
                    </div>

                    <div class="space-y-2 relative z-10">
                        <label class="font-label text-xs uppercase tracking-widest text-on-surface-variant block"
                            for="message">Message</label>
                        <textarea
                            class="w-full bg-surface-container-low border border-outline/30 rounded-DEFAULT px-4 py-3 text-on-surface font-body focus:outline-none focus:ring-0 focus:border-outline/30 min-h-[160px] resize-y"
                            id="message" name="message"
                            placeholder="Describe your project requirements here..."></textarea>
                    </div>

                    <button
                        class="relative z-10 bg-primary text-on-primary w-full py-4 rounded-DEFAULT font-label uppercase tracking-widest text-sm flex items-center justify-center gap-3 hover:bg-primary-dim hover:scale-105 hover:shadow-primary/30 transition-all duration-300 shadow-lg shadow-primary/10 active:scale-[0.98]"
                        type="submit">
                        <span class="material-symbols-outlined text-sm">send</span>
                        Send Message
                    </button>
                </form>
            </div>
        </div>
    </main>

                © 2026 John Jones. All rights reserved.

            <div class="flex gap-6 items-center">
